<!DOCTYPE html>
<html>

<head>

<title>Chileshe | AI & Embedded Systems Developer</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
margin:0;
background:#0f172a;
color:white;
line-height:1.6;
}

/* HERO */

.hero{
display:flex;
align-items:center;
justify-content:center;
gap:40px;
padding:80px 20px;
flex-wrap:wrap;
text-align:center;
}

.hero img{
width:220px;
max-width:80%;
border-radius:50%;
border:4px solid #22c55e;
}

.hero-text h1{
font-size:40px;
margin-bottom:10px;
}

.hero-text p{
font-size:18px;
opacity:0.9;
}

/* BUTTONS */

button{
padding:12px 22px;
margin:8px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.whatsapp{
background:#25D366;
color:white;
}

.linkedin{
background:#0a66c2;
color:white;
}

/* SECTIONS */

section{
padding:60px 20px;
text-align:center;
}

h2{
margin-bottom:40px;
font-size:30px;
}

/* SKILLS */

.skills{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.skill{
background:#1e293b;
padding:20px;
border-radius:10px;
width:130px;
transition:0.3s;
}

.skill:hover{
transform:translateY(-5px);
}

.skill i{
font-size:32px;
margin-bottom:10px;
}

/* PROJECTS */

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:20px;
}

/* FOOTER */

footer{
background:#020617;
padding:30px;
text-align:center;
font-size:14px;
opacity:0.8;
}

/* MOBILE RESPONSIVENESS */

@media (max-width:768px){

.hero{
flex-direction:column;
padding:60px 20px;
}

.hero-text h1{
font-size:32px;
}

.hero-text p{
font-size:16px;
}

.skill{
width:110px;
padding:16px;
}

button{
width:90%;
max-width:250px;
}

}

</style>

</head>

<body>

<div class="hero">

<img src="20250814_084846.jpg">

<div class="hero-text">

<p>AI • Robotics • Embedded Systems Developer</p>

<i class="fab fa-whatsapp"></i> WhatsApp
</button>

<button class="linkedin" onclick="window.location.href='https://linkedin.com/in/YOURPROFILE'">
<i class="fab fa-linkedin"></i> LinkedIn
</button>

</div>

</div>

<section>

<h2>Skills</h2>

<div class="skills">

<div class="skill">
<i class="fab fa-python"></i>
<p>Python</p>
</div>

<div class="skill">
<i class="fas fa-microchip"></i>
<p>ESP32</p>
</div>

<div class="skill">
<i class="fas fa-robot"></i>
<p>Robotics</p>
</div>

<div class="skill">
<i class="fas fa-brain"></i>
<p>AI / ML</p>
</div>

</div>

</section>

<section>

<h2>Projects</h2>

<div class="projects">

<div class="card">

<img src="rover.jpg">

<div class="card-content">

<h3>Autonomous AI Rover</h3>

<p>Robot navigation using reinforcement learning.</p>

</div>

</div>

<div class="card-content">

<p>Wireless monitoring system using sensors.</p>

</div>

</div>

</div>

</section>

<footer>

<p>© 2026 Chileshe</p>

</footer>

</body>

</html>
